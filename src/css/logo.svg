<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for Obsidian & Silver Gradients, Filters, and Shadows -->
  <defs>
    <!-- Drop Shadow for the crystal to make it pop on both light and dark backgrounds -->
    <filter id="crystal-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Glowing filter for silver nodes and data wing -->
    <filter id="silver-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Glass Refraction Overlay Gradient (High-end metallic reflection) -->
    <linearGradient id="glass-reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Outer Facet Gradients (3D Obsidian & Silver Crystal effect) -->
    <!-- 1. Top Facet (Catches light directly - Pure Silver/White) -->
    <linearGradient id="facet-top" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E4E4E7" />
    </linearGradient>

    <!-- 2. Top-Right Facet (Sleek light silver) -->
    <linearGradient id="facet-top-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4E4E7" />
      <stop offset="100%" stop-color="#A1A1AA" />
    </linearGradient>

    <!-- 3. Bottom-Right Facet (Slate grey transition to shadow) -->
    <linearGradient id="facet-bottom-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#71717A" />
      <stop offset="100%" stop-color="#27272A" />
    </linearGradient>

    <!-- 4. Bottom Facet (Deepest Obsidian shadow) -->
    <linearGradient id="facet-bottom" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#27272A" />
      <stop offset="100%" stop-color="#09090B" />
    </linearGradient>

    <!-- 5. Bottom-Left Facet (Dark Obsidian transition) -->
    <linearGradient id="facet-bottom-left" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#09090B" />
      <stop offset="100%" stop-color="#3F3F46" />
    </linearGradient>

    <!-- 6. Top-Left Facet (Rebound silver reflection) -->
    <linearGradient id="facet-top-left" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3F3F46" />
      <stop offset="100%" stop-color="#F4F4F5" />
    </linearGradient>

    <!-- Deep Obsidian Core Background Gradient -->
    <radialGradient id="center-core" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#18181B" stop-opacity="0.95" />
      <stop offset="70%" stop-color="#09090B" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.98" />
    </radialGradient>

    <!-- Platinum Wing Gradients -->
    <linearGradient id="wing-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E4E4E7" />
    </linearGradient>
    <linearGradient id="wing-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4D4D8" />
      <stop offset="100%" stop-color="#71717A" />
    </linearGradient>
    <linearGradient id="wing-keel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52525B" />
      <stop offset="100%" stop-color="#18181B" />
    </linearGradient>
  </defs>

  <!-- Main Logo Structure with Shadow -->
  <g filter="url(#crystal-shadow)">
    <!-- 1. Outer Facet 1: Top (Silver Light) -->
    <path d="M 256,56 L 429.2,156 L 342.6,206 L 256,156 Z" fill="url(#facet-top)" />

    <!-- 2. Outer Facet 2: Top-Right (Silver Mid) -->
    <path d="M 429.2,156 L 429.2,356 L 342.6,306 L 342.6,206 Z" fill="url(#facet-top-right)" />

    <!-- 3. Outer Facet 3: Bottom-Right (Obsidian Transition) -->
    <path d="M 429.2,356 L 256,456 L 256,356 L 342.6,306 Z" fill="url(#facet-bottom-right)" />

    <!-- 4. Outer Facet 4: Bottom (Deep Obsidian Black) -->
    <path d="M 256,456 L 82.8,356 L 169.4,306 L 256,356 Z" fill="url(#facet-bottom)" />

    <!-- 5. Outer Facet 5: Bottom-Left (Obsidian Mid) -->
    <path d="M 82.8,356 L 82.8,156 L 169.4,206 L 169.4,306 Z" fill="url(#facet-bottom-left)" />

    <!-- 6. Outer Facet 6: Top-Left (Silver Reflex) -->
    <path d="M 82.8,156 L 256,56 L 256,156 L 169.4,206 Z" fill="url(#facet-top-left)" />

    <!-- 7. Outer Crystal Edge Highlights (Polished White Border) -->
    <polygon points="256,56 429.2,156 429.2,356 256,456 82.8,356 82.8,156" 
             fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.5" />

    <!-- 8. Inner Crystal Facet Seams (Fine Silver Refraction Lines) -->
    <line x1="256" y1="56" x2="256" y2="156" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35" />
    <line x1="429.2" y1="156" x2="342.6" y2="206" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35" />
    <line x1="429.2" y1="356" x2="342.6" y2="306" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35" />
    <line x1="256" y1="456" x2="256" y2="356" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35" />
    <line x1="82.8" y1="356" x2="169.4" y2="306" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35" />
    <line x1="82.8" y1="156" x2="169.4" y2="206" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.35" />

    <!-- 9. Inner Central Hexagon Core (Deep Obsidian Backing) -->
    <polygon points="256,156 342.6,206 342.6,306 256,356 169.4,306 169.4,206" 
             fill="url(#center-core)" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.3" />

    <!-- 10. Glassmorphic Reflection Overlay for the whole Crystal -->
    <polygon points="256,56 429.2,156 429.2,356 256,456 82.8,356 82.8,156" 
             fill="url(#glass-reflection)" pointer-events="none" />

    <!-- 11. Network Topology Lines (Dotted Silver Mesh Overlay) -->
    <g stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="3,3" stroke-opacity="0.5" filter="url(#silver-glow)">
      <!-- Left wingtip to node -->
      <line x1="190" y1="260" x2="180" y2="210" />
      <!-- Nose to node -->
      <line x1="300" y1="190" x2="320" y2="230" />
      <!-- Keel to node -->
      <line x1="245" y1="275" x2="230" y2="320" />
    </g>

    <!-- 12. Network Node Silver Glow Dots -->
    <g fill="#FFFFFF" filter="url(#silver-glow)">
      <circle cx="180" cy="210" r="4.5" />
      <circle cx="320" cy="230" r="4.5" />
      <circle cx="230" cy="320" r="4.5" />
    </g>

    <!-- 13. The 3D Platinum Cyber Flying Wing (Core Data routing proxy symbol) -->
    <g filter="url(#silver-glow)">
      <!-- Keel Underwing (Shadow side) -->
      <path d="M 245,275 L 260,295 L 300,190 Z" fill="url(#wing-keel)" />
      <!-- Left Wing Panel -->
      <path d="M 300,190 L 190,260 L 245,275 Z" fill="url(#wing-left)" />
      <!-- Right Wing Panel -->
      <path d="M 300,190 L 245,275 L 310,290 Z" fill="url(#wing-right)" />
    </g>
    
    <!-- Wing Core Highlight Line -->
    <path d="M 300,190 L 245,275" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8" />
  </g>
</svg>
